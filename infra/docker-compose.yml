version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vibematch_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: vibematch_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongodb_data: